name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    # self-hosted раннер развёрнут прямо на сервере (challenge-vps): деплой локально, без SSH,
    # не зависит от GitHub-hosted минут. Скрипт берёт flock — общий с systemd-таймером.
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Pull latest and redeploy
        run: /usr/local/bin/challenge-deploy.sh
